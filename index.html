<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "CryptoDeFiBridge",
      "url": "https://cryptodefibridge.com",
      "logo": "https://cryptodefibridge.com/favicon.png",
      "description": "Non-custodial cross-chain DeFi bridge and swap aggregator"
    }
    </script>
    
    <!-- JSON-LD Structured Data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "CryptoDeFiBridge",
      "url": "https://cryptodefibridge.com",
      "description": "Cross-chain DeFi bridge & swap aggregator. Swap tokens across multiple blockchains using optimal liquidity routes.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",

      },

        "Multi-chain bridge aggregation",
        "Non-custodial transactions",
        "Transparent fees",
        "Best route optimization"
      ]
    }

    <!-- JSON-LD Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "CryptoDeFiBridge",
      "url": "https://cryptodefibridge.com",
      "description": "Cross-chain DeFi bridge & swap aggregator",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web"
    }
    </script>
    
    <!-- JSON-LD Structured Data: WebSite with Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CryptoDeFiBridge",
      "url": "https://cryptodefibridge.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://cryptodefibridge.com/swap?token={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
