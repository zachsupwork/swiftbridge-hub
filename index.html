<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO -->
    <title>CryptoDeFiBridge | Cross-Chain DeFi Bridge & Swap Aggregator</title>
    <meta name="description" content="CryptoDeFiBridge is a cross-chain DeFi bridge and swap aggregator. Swap tokens across multiple blockchains using the best liquidity routes with transparent fees." />
    <meta name="keywords" content="crypto defi bridge, cross chain swap, defi bridge, crypto bridge swap, multichain defi swap, li.fi bridge, cross chain crypto exchange, defi aggregator, crypto token swap" />
    <link rel="canonical" href="https://cryptodefibridge.com" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cryptodefibridge.com" />
    <meta property="og:title" content="CryptoDeFiBridge | Cross-Chain DeFi Bridge" />
    <meta property="og:description" content="Swap and bridge crypto assets across blockchains using best-price routing" />
    <meta property="og:image" content="https://cryptodefibridge.com/og-image.png" />
    <meta property="og:site_name" content="CryptoDeFiBridge" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://cryptodefibridge.com" />
    <meta name="twitter:title" content="CryptoDeFiBridge | Cross-Chain DeFi Bridge" />
    <meta name="twitter:description" content="Swap and bridge crypto assets across blockchains using best-price routing" />
    <meta name="twitter:image" content="https://cryptodefibridge.com/og-image.png" />
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CryptoDeFiBridge",
      "url": "https://cryptodefibridge.com",
      "logo": "https://cryptodefibridge.com/favicon.png",
      "description": "Cross-chain DeFi bridge and swap aggregator",
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CryptoDeFiBridge",
      "url": "https://cryptodefibridge.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://cryptodefibridge.com/swap?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
